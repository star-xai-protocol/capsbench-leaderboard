name: Run Scenario Evaluation

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 👇 DIAGNÓSTICO EXTREMO: ¿Qué hay realmente en el servidor?
      - name: 🕵️ DEBUG - List Files on Server
        run: |
          echo "📂 --- LISTADO DE ARCHIVOS EN EL SERVIDOR (GIT) ---"
          ls -R
          echo "---------------------------------------------------"
          
          if [ -d "src" ]; then
            echo "✅ ¡BINGO! La carpeta 'src' EXISTE en el servidor."
          else
            echo "❌ ERROR FATAL: La carpeta 'src' NO EXISTE en el servidor."
            echo "Esto significa que 'git push' no funcionó como esperabas."
            exit 1  # Forzamos fallo aquí para no perder tiempo con Docker
          fi

      # 👇 BORRAMOS EL .dockerignore PARA QUE DOCKER COPIE TODO
      - name: 🚨 EMERGENCY - Clean Docker Ignore
        run: |
          echo "🧹 Buscando y borrando .dockerignore..."
          rm -f .dockerignore
          echo "✅ .dockerignore eliminado (si existía)."

      # 👇 EL DOCKERFILE QUE LO COPIA TODO
      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          WORKDIR /app
          
          # Herramientas
          RUN apt-get update && apt-get install -y curl findutils && rm -rf /var/lib/apt/lists/*
          
          # Librerías
          RUN pip install --no-cache-dir requests toml
          
          # 👇 COPIAMOS TODO (Ahora que no hay .dockerignore, copiará src sí o sí)
          COPY . .
          
          # 👇 DEPURACIÓN DENTRO DE DOCKER (Para ver qué ha copiado)
          RUN echo "📂 --- LISTADO DENTRO DE DOCKER ---" && ls -R && echo "-----------------------------"
          
          # Ejecución inteligente
          CMD ["sh", "-c", "export AGENT_FILE=\$(find . -name green_agent.py -print -quit); if [ -z \"\$AGENT_FILE\" ]; then echo '❌ ERROR CRÍTICO: Sigue sin aparecer green_agent.py'; exit 1; else python \"\$AGENT_FILE\" --host 0.0.0.0 --port 9009; fi"]
          EOF

      - name: Create Manual docker-compose.yml
        run: |
          cat <<EOF > docker-compose.yml
          services:
            green-agent:
              build:
                context: .
                dockerfile: Dockerfile
              ports:
                - "9009:9009"
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:9009/.well-known/agent-card.json"]
                interval: 5s
                timeout: 5s
                retries: 10
                start_period: 5s
              networks:
                - agent-network

            purple-agent:
              image: ghcr.io/star-xai-protocol/capsbench-purple:v1.0
              environment:
                - GOOGLE_API_KEY=\${GOOGLE_API_KEY}
                - SERVER_URL=http://green-agent:9009
              depends_on:
                green-agent:
                  condition: service_healthy
              networks:
                - agent-network

            agentbeats-client:
              image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
              volumes:
                - ./scenario.toml:/app/scenario.toml
                - ./output:/app/output
              command: ["scenario.toml", "output/results.json"]
              depends_on:
                green-agent:
                  condition: service_healthy
                purple-agent:
                  condition: service_started
              networks:
                - agent-network

          networks:
            agent-network:
          EOF

      - name: Prepare Output Directory
        run: mkdir -p output && chmod 777 output

      - name: Create .env file
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: echo "$SECRETS_JSON" | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]' > .env

      - name: Run Scenario
        run: docker compose up --build --timestamps --no-color --exit-code-from agentbeats-client --abort-on-container-exit

      - name: Teardown
        if: always()
        run: docker compose down -v || true
