name: Run Scenario Evaluation

on:
  push:
    branches:
      - '**'  # Se ejecuta en todas las ramas
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install tomli tomli-w pyyaml requests

      # 🚨 EL TRUCO MAESTRO: Engañamos al script para que acepte código local
      - name: Generate docker-compose.yml
        env:
          GITHUB_ACTIONS: "false"
        run: python generate_compose.py --scenario scenario.toml

      # 🚨 IMPORTANTE: Quitamos el paso de "Pull" porque tu imagen es local

      - name: Login to GHCR (Optional but good for Purple Agent)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Output Directory
        run: mkdir -p output && chmod 777 output

      - name: Create .env file
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: echo "$SECRETS_JSON" | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]' > .env

      # 🚨 EJECUCIÓN CON BUILD FORZADO
      - name: Run Scenario
        # Añadimos --build para obligar a leer tu Dockerfile
        run: docker compose up --build --timestamps --no-color --exit-code-from agentbeats-client --abort-on-container-exit

      - name: Teardown
        if: always()
        run: docker compose down -v || true
