name: Run Scenario Evaluation

on:
  push:
    branches: ["**"]
  pull_request:
  # 👇 ESTO ES NUEVO: Te permitirá lanzar el test pulsando un botón
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔍 DIAGNÓSTICO: ¿Está la carpeta src?
      - name: DEBUG - Check Server Files
        run: |
          echo "📂 Buscando carpeta src..."
          if [ -d "src" ]; then 
            echo "✅ EXISTE. Contenido:"
            ls -R src
          else 
            echo "❌ NO EXISTE (Problema de Git)"
          fi

      # 🧹 LIMPIEZA: Borrar .dockerignore
      - name: Cleanup Ignore Files
        run: rm -f .dockerignore

      # 🐳 DOCKERFILE: Fabricación manual
      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          WORKDIR /app
          RUN apt-get update && apt-get install -y curl findutils && rm -rf /var/lib/apt/lists/*
          RUN pip install --no-cache-dir requests toml
          # Copiamos TODO
          COPY . .
          # Comando de búsqueda y ejecución
          CMD ["sh", "-c", "target=\$(find . -name green_agent.py -print -quit); if [ -z \"\$target\" ]; then echo '❌ ERROR: No encuentro el agente'; find . -maxdepth 4; exit 1; else echo \"✅ Arrancando: \$target\"; export PYTHONPATH=\$PYTHONPATH:\$(dirname \$target):/app/src; python \"\$target\" --host 0.0.0.0 --port 9009; fi"]
          EOF

      - name: Create docker-compose.yml
        run: |
          cat <<EOF > docker-compose.yml
          services:
            green-agent:
              build:
                context: .
                dockerfile: Dockerfile
              ports:
                - "9009:9009"
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:9009/.well-known/agent-card.json"]
                interval: 5s
                timeout: 5s
                retries: 10
                start_period: 5s
              networks:
                - agent-network
            purple-agent:
              image: ghcr.io/star-xai-protocol/capsbench-purple:v1.0
              environment:
                - GOOGLE_API_KEY=\${GOOGLE_API_KEY}
                - SERVER_URL=http://green-agent:9009
              depends_on:
                green-agent:
                  condition: service_healthy
              networks:
                - agent-network
            agentbeats-client:
              image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
              volumes:
                - ./scenario.toml:/app/scenario.toml
                - ./output:/app/output
              command: ["scenario.toml", "output/results.json"]
              depends_on:
                green-agent:
                  condition: service_healthy
                purple-agent:
                  condition: service_started
              networks:
                - agent-network
          networks:
            agent-network:
          EOF

      - name: Prepare Output Directory
        run: mkdir -p output && chmod 777 output

      - name: Create .env file
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: echo "$SECRETS_JSON" | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]' > .env

      - name: Run Scenario
        run: docker compose up --build --timestamps --no-color --exit-code-from agentbeats-client --abort-on-container-exit

      - name: Teardown
        if: always()
        run: docker compose down -v || true
