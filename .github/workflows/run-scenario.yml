name: Run Scenario Evaluation

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔍 DIAGNÓSTICO 1: ¿Git se ha bajado la carpeta src?
      # Si aquí no sale 'src', es culpa de Git. Si sale, es culpa de Docker.
      - name: 🕵️ DEBUG - Check Files on Runner
        run: |
          echo "📂 Listando archivos en el servidor de GitHub (Antes de Docker):"
          ls -la
          echo "📂 ¿Existe la carpeta src?"
          if [ -d "src" ]; then 
            echo "✅ SÍ, src existe. Contenido:"
            ls -R src
          else 
            echo "❌ NO, src no existe en el servidor."
          fi

      # 👇 LA SOLUCIÓN: Borramos .dockerignore para que no bloquee nada
      - name: 🚨 EMERGENCY - Force Dockerfile & Clean Ignore
        run: |
          echo "🧹 Borrando .dockerignore por si acaso..."
          rm -f .dockerignore

          echo "Fabricando Dockerfile de emergencia..."
          cat <<EOF > Dockerfile
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          WORKDIR /app
          
          # Instalamos herramientas básicas
          RUN apt-get update && apt-get install -y --no-install-recommends curl findutils && rm -rf /var/lib/apt/lists/*
          
          # Instalamos librerías
          RUN pip install --no-cache-dir requests toml
          
          # Copiamos TODO (Al no haber .dockerignore, copiará src sí o sí)
          COPY . .
          
          # Buscamos y ejecutamos
          CMD ["sh", "-c", "export AGENT_FILE=\$(find . -name green_agent.py -print -quit); if [ -z \"\$AGENT_FILE\" ]; then echo '❌ ERROR: green_agent.py sigue sin aparecer. Listado final:'; find . -maxdepth 3; exit 1; else echo \"✅ ENCONTRADO EN: \$AGENT_FILE\"; export PYTHONPATH=\$PYTHONPATH:\$(dirname \$AGENT_FILE):/app/src; python \"\$AGENT_FILE\" --host 0.0.0.0 --port 9009; fi"]
          EOF

      - name: Create Manual docker-compose.yml
        run: |
          cat <<EOF > docker-compose.yml
          services:
            green-agent:
              build:
                context: .
                dockerfile: Dockerfile
              ports:
                - "9009:9009"
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:9009/.well-known/agent-card.json"]
                interval: 5s
                timeout: 5s
                retries: 10
                start_period: 5s
              networks:
                - agent-network

            purple-agent:
              image: ghcr.io/star-xai-protocol/capsbench-purple:v1.0
              environment:
                - GOOGLE_API_KEY=\${GOOGLE_API_KEY}
                - SERVER_URL=http://green-agent:9009
              depends_on:
                green-agent:
                  condition: service_healthy
              networks:
                - agent-network

            agentbeats-client:
              image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
              volumes:
                - ./scenario.toml:/app/scenario.toml
                - ./output:/app/output
              command: ["scenario.toml", "output/results.json"]
              depends_on:
                green-agent:
                  condition: service_healthy
                purple-agent:
                  condition: service_started
              networks:
                - agent-network

          networks:
            agent-network:
          EOF

      - name: Prepare Output Directory
        run: mkdir -p output && chmod 777 output

      - name: Create .env file
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: echo "$SECRETS_JSON" | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]' > .env

      - name: Run Scenario
        run: docker compose up --build --timestamps --no-color --exit-code-from agentbeats-client --abort-on-container-exit

      - name: Teardown
        if: always()
        run: docker compose down -v || true
