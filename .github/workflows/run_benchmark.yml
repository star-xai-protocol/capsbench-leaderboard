name: Run CapsBench Evaluation

on:
  push:
    paths:
      - 'scenario.toml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # <--- ACTUALIZADO a v4

      - name: Set up Python
        uses: actions/setup-python@v5 # <--- ACTUALIZADO a v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tomli-w requests

      - name: Download Orchestrator Script
        run: curl -O https://raw.githubusercontent.com/agentbeats/leaderboard-template/main/generate_compose.py

      - name: Run Evaluation Game
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python generate_compose.py --scenario scenario.toml
          docker compose up --abort-on-container-exit

      - name: Upload Results (Artifact)
        if: always()
        uses: actions/upload-artifact@v4  # <--- ESTE ERA EL CULPABLE (v4)
        with:
          name: results
          path: output/
